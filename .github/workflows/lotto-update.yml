name: Update Lotto Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create data folder
        run: mkdir -p data

      - name: Download Lotto History
        run: |
          python << 'EOF'
          import json
          import os

          output = {
              "latestRound": 1,
              "count": 1,
              "draws": [
                  {
                      "drwNo": 1,
                      "date": "2002-12-07",
                      "numbers": [10, 23, 29, 33, 37, 40],
                      "bonus": 16
                  }
              ]
          }

          os.makedirs("data", exist_ok=True)

          with open("data/lotto-history.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False)

          print("saved")
          EOF

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/lotto-history.json

          git diff --staged --quiet || git commit -m "Update lotto history"

          git push

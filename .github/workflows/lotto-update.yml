name: Update Lotto Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create data folder
        run: mkdir -p data

      - name: Download Lotto History
        run: |
          python << 'EOF'
          import json
          import urllib.request
          import os

          draws = []

          for drw in range(1,3000):
              try:
                  url = f"https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={drw}"

                  with urllib.request.urlopen(url, timeout=10) as r:
                      data = json.loads(r.read().decode("utf-8"))

                  if data.get("returnValue") != "success":
                      break

                  draws.append({
                      "drwNo": data["drwNo"],
                      "date": data["drwNoDate"],
                      "numbers": [
                          data["drwtNo1"],
                          data["drwtNo2"],
                          data["drwtNo3"],
                          data["drwtNo4"],
                          data["drwtNo5"],
                          data["drwtNo6"]
                      ],
                      "bonus": data["bnusNo"]
                  })

              except Exception as e:
                  print(e)

          draws = draws[-300:]

          output = {
              "latestRound": draws[-1]["drwNo"] if draws else 0,
              "count": len(draws),
              "draws": draws
          }

          os.makedirs("data", exist_ok=True)

          with open("data/lotto-history.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False)

          print("saved", len(draws))
          EOF

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/lotto-history.json

          git diff --staged --quiet || git commit -m "Update lotto history"

          git push
